networks:
  bots: {}

services:
  bot:
    container_name: germ-bot
    links: [db, jaeger, otel-collector]
    build: .
    networks:
      - bots
    volumes:
      - ./:/src
    environment: &local-dev
      DB_HOST: germ-db
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OTLP_METRICS_ENDPOINT: "http://germ-otel-collector:4317"
      JAEGER_EXPORTER_HOST: "germ-jaeger"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    working_dir: /src
    command: [
      "opentelemetry-instrument",
      "gunicorn", "-c", "bot/gunicorn_config.py", "bot.main:bot", "--bind", "0.0.0.0:8000"
    ]
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 9s
      retries: 6

  db:
    container_name: germ-db
    image: postgres:16
    networks:
      - bots
    environment:
      POSTGRES_DB: germ
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5432"]
      interval: 10s
      timeout: 9s
      retries: 6

  jaeger:
    container_name: germ-jaeger
    image: jaegertracing/all-in-one:1.58
    networks:
      - bots
    ports:
      - "8002:16686"  # Jaeger UI
      - "14250:14250"  # Jaeger collector gRPC endpoint
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "14250"]
      interval: 10s
      timeout: 9s
      retries: 6

  otel-collector:
    container_name: germ-otel-collector
    links: [jaeger]
    image: otel/opentelemetry-collector:latest
    networks:
      - bots
    ports:
      - "4317:4317"  # OTLP gRPC receiver
    volumes:
      - ./bot/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4317"]
      interval: 10s
      timeout: 9s
      retries: 6

  test:
    container_name: germ-test
    links: [db, bot]
    build: .
    networks:
      - bots
    volumes:
      - ./:/src
    environment: *local-dev
    working_dir: /src
    command: ["pytest", "tests"]